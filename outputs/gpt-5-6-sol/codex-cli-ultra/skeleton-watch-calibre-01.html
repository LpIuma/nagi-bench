<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050706">
  <title>Calibre 01 — 镂空机械腕表</title>
  <style>
    :root {
      --ink: #f2f3ec;
      --muted: #949b93;
      --faint: rgba(225, 235, 226, .10);
      --line: rgba(219, 233, 223, .16);
      --panel: rgba(9, 13, 11, .68);
      --accent: #c7ff8b;
      --accent-2: #69f1c5;
      --gold: #d8b878;
      --danger: #ff5a60;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050706;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background:
        radial-gradient(circle at 50% 42%, transparent 0 20%, rgba(0,0,0,.18) 58%, rgba(0,0,0,.72) 100%),
        linear-gradient(125deg, rgba(86, 122, 103, .07), transparent 35%, rgba(181, 143, 82, .035) 70%, transparent);
      mix-blend-mode: screen;
    }

    body::after {
      content: "";
      position: fixed;
      inset: -50%;
      z-index: 3;
      pointer-events: none;
      opacity: .035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.75'/%3E%3C/svg%3E");
      animation: grain .28s steps(2) infinite;
    }

    @keyframes grain {
      0% { transform: translate3d(0, 0, 0); }
      25% { transform: translate3d(2%, -1%, 0); }
      50% { transform: translate3d(-1%, 2%, 0); }
      75% { transform: translate3d(1%, 1%, 0); }
      100% { transform: translate3d(-2%, -1%, 0); }
    }

    button { font: inherit; }

    #stage {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    #stage canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      outline: none;
    }

    #stage canvas:active { cursor: grabbing; }

    .topbar {
      position: fixed;
      z-index: 10;
      top: 0;
      left: 0;
      right: 0;
      height: 92px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 26px 30px;
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      pointer-events: auto;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(231, 239, 230, .45);
      border-radius: 50%;
      display: grid;
      place-items: center;
      position: relative;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,.025), 0 0 24px rgba(154, 255, 198, .08);
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      width: 1px;
      height: 12px;
      background: var(--accent);
      transform-origin: 50% 100%;
      bottom: 50%;
      box-shadow: 0 0 8px rgba(199,255,139,.8);
    }

    .brand-mark::before { transform: rotate(42deg); }
    .brand-mark::after { height: 8px; transform: rotate(-58deg); }

    .brand-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      letter-spacing: .16em;
      line-height: 1;
    }

    .brand-sub {
      margin-top: 7px;
      color: var(--muted);
      font-size: 9px;
      letter-spacing: .28em;
      text-transform: uppercase;
    }

    .scene-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-top: 2px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-2);
      box-shadow: 0 0 0 4px rgba(105,241,197,.08), 0 0 14px rgba(105,241,197,.65);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse { 50% { opacity: .45; transform: scale(.8); } }

    .chapter {
      position: fixed;
      z-index: 8;
      left: 30px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      writing-mode: vertical-rl;
      color: rgba(220, 228, 220, .36);
      font-size: 9px;
      letter-spacing: .32em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .chapter::before {
      content: "";
      width: 1px;
      height: 46px;
      background: linear-gradient(transparent, rgba(225,235,226,.42), transparent);
    }

    .panel {
      position: fixed;
      z-index: 12;
      top: 104px;
      right: 26px;
      width: min(340px, calc(100vw - 52px));
      max-height: calc(100vh - 202px);
      overflow: auto;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(17,22,19,.78), rgba(7,10,9,.56));
      box-shadow: 0 22px 80px rgba(0,0,0,.34), inset 0 1px rgba(255,255,255,.04);
      backdrop-filter: blur(20px) saturate(125%);
      -webkit-backdrop-filter: blur(20px) saturate(125%);
      transition: opacity .35s ease, transform .45s cubic-bezier(.2,.8,.2,1);
    }

    .panel.closed {
      opacity: 0;
      pointer-events: none;
      transform: translateX(24px) scale(.97);
    }

    .panel-kicker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--accent);
      font-size: 9px;
      letter-spacing: .26em;
      text-transform: uppercase;
    }

    .panel-close {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 0;
      width: 24px;
      height: 24px;
      cursor: pointer;
      font-size: 19px;
      line-height: 1;
    }

    .panel h1 {
      margin: 20px 0 8px;
      max-width: 270px;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 400;
      font-size: clamp(24px, 3vw, 34px);
      letter-spacing: -.025em;
      line-height: 1.04;
    }

    .panel-lead {
      margin: 0;
      color: #b7bdb6;
      font-size: 12px;
      line-height: 1.75;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      margin: 21px 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: var(--line);
    }

    .metric {
      min-height: 68px;
      padding: 12px 10px;
      background: rgba(6,9,7,.76);
    }

    .metric-value {
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 17px;
    }

    .metric-label {
      margin-top: 6px;
      color: #737a73;
      font-size: 8px;
      letter-spacing: .12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .detail-list {
      border-top: 1px solid var(--line);
      margin-top: 4px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 11px 0;
      border-bottom: 1px solid rgba(225,235,226,.075);
      font-size: 10px;
    }

    .detail-row span:first-child { color: #747b74; }
    .detail-row span:last-child { color: #d9ddd7; text-align: right; }

    .focus-button {
      width: 100%;
      margin-top: 18px;
      padding: 12px 16px;
      border: 1px solid rgba(199,255,139,.27);
      border-radius: 10px;
      color: var(--accent);
      background: linear-gradient(180deg, rgba(199,255,139,.09), rgba(199,255,139,.025));
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .25s, border-color .25s, transform .25s;
    }

    .focus-button:hover {
      background: rgba(199,255,139,.13);
      border-color: rgba(199,255,139,.5);
      transform: translateY(-1px);
    }

    .toolbar-wrap {
      position: fixed;
      z-index: 15;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: rgba(8,12,10,.72);
      box-shadow: 0 16px 54px rgba(0,0,0,.36), inset 0 1px rgba(255,255,255,.04);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .tool-button {
      position: relative;
      height: 42px;
      min-width: 42px;
      padding: 0 12px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      color: #9da49d;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: color .25s, border-color .25s, background .25s;
    }

    .tool-button svg {
      width: 17px;
      height: 17px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .tool-button span {
      font-size: 9px;
      letter-spacing: .12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .tool-button:hover,
    .tool-button.active {
      color: var(--accent);
      border-color: rgba(199,255,139,.18);
      background: rgba(199,255,139,.065);
    }

    .separator { width: 1px; height: 22px; background: var(--line); margin: 0 2px; }

    .info-toggle {
      width: 46px;
      height: 46px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 50%;
      color: var(--ink);
      background: rgba(8,12,10,.72);
      cursor: pointer;
      backdrop-filter: blur(16px);
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 16px;
      transition: border-color .25s, color .25s;
    }

    .info-toggle:hover { color: var(--accent); border-color: rgba(199,255,139,.35); }

    .hint {
      position: fixed;
      z-index: 8;
      left: 50%;
      bottom: 86px;
      transform: translateX(-50%);
      color: rgba(218,225,217,.44);
      font-size: 9px;
      letter-spacing: .13em;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity .5s;
    }

    .hint.hide { opacity: 0; }

    #tooltip {
      position: fixed;
      z-index: 20;
      left: 0;
      top: 0;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(-100px,-100px,0);
      transition: opacity .15s;
    }

    #tooltip.visible { opacity: 1; }

    .tooltip-box {
      position: relative;
      margin: 14px 0 0 14px;
      min-width: 128px;
      padding: 9px 12px 10px;
      border: 1px solid rgba(199,255,139,.28);
      border-radius: 8px;
      background: rgba(7,10,8,.88);
      box-shadow: 0 12px 36px rgba(0,0,0,.35);
      backdrop-filter: blur(12px);
    }

    .tooltip-box::before {
      content: "";
      position: absolute;
      width: 5px;
      height: 5px;
      top: -18px;
      left: -18px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(199,255,139,.7);
    }

    .tooltip-id {
      color: var(--accent);
      font-size: 8px;
      letter-spacing: .2em;
      text-transform: uppercase;
    }

    .tooltip-name { margin-top: 4px; color: var(--ink); font-size: 11px; }

    #hotspots {
      position: fixed;
      inset: 0;
      z-index: 9;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      left: 0;
      top: 0;
      display: flex;
      align-items: center;
      gap: 7px;
      color: rgba(227,234,226,.72);
      font-size: 8px;
      letter-spacing: .13em;
      text-transform: uppercase;
      pointer-events: auto;
      cursor: pointer;
      transform: translate(-4px,-4px);
      transition: opacity .2s, color .2s;
      white-space: nowrap;
    }

    .hotspot::before {
      content: "";
      width: 7px;
      height: 7px;
      flex: 0 0 auto;
      border: 1px solid currentColor;
      border-radius: 50%;
      background: rgba(5,7,6,.7);
      box-shadow: 0 0 0 3px rgba(199,255,139,.045);
    }

    .hotspot::after {
      content: "";
      position: absolute;
      left: 7px;
      top: 3px;
      width: 22px;
      height: 1px;
      background: currentColor;
      opacity: .28;
    }

    .hotspot span {
      margin-left: 20px;
      padding: 5px 7px;
      border-radius: 5px;
      background: rgba(5,8,6,.54);
      backdrop-filter: blur(8px);
    }

    .hotspot:hover { color: var(--accent); }
    .hotspot.offscreen { opacity: 0; pointer-events: none; }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      background: #050706;
      transition: opacity .8s ease, visibility .8s;
    }

    .loading.done { opacity: 0; visibility: hidden; }

    .loader {
      width: min(360px, calc(100vw - 64px));
      text-align: center;
    }

    .loader-ring {
      position: relative;
      width: 72px;
      height: 72px;
      margin: 0 auto 28px;
      border: 1px solid rgba(225,235,226,.12);
      border-radius: 50%;
    }

    .loader-ring::before {
      content: "";
      position: absolute;
      inset: 7px;
      border: 1px solid transparent;
      border-top-color: var(--accent);
      border-right-color: rgba(199,255,139,.24);
      border-radius: 50%;
      animation: spin 1.3s cubic-bezier(.6,.1,.4,.9) infinite;
    }

    .loader-ring::after {
      content: "";
      position: absolute;
      inset: 23px;
      border: 1px solid rgba(225,235,226,.25);
      border-radius: 50%;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-title {
      font-family: Georgia, serif;
      font-size: 20px;
      letter-spacing: .08em;
    }

    .loader-copy {
      margin-top: 10px;
      color: #747c74;
      font-size: 9px;
      letter-spacing: .2em;
      text-transform: uppercase;
    }

    .loader-track {
      height: 1px;
      margin-top: 26px;
      overflow: hidden;
      background: rgba(225,235,226,.1);
    }

    .loader-track::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: load 1.2s ease-in-out infinite;
    }

    @keyframes load { from { transform: translateX(-110%); } to { transform: translateX(330%); } }

    .noscript {
      position: fixed;
      z-index: 200;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 40px;
      color: #ddd;
      background: #050706;
      text-align: center;
    }

    @media (max-width: 820px) {
      .topbar { height: 76px; padding: 18px; }
      .scene-meta, .chapter { display: none; }
      .brand-title { font-size: 15px; }
      .panel {
        top: auto;
        right: 12px;
        bottom: 82px;
        width: calc(100vw - 24px);
        max-height: min(55vh, 520px);
        padding: 18px;
      }
      .panel.closed { transform: translateY(18px) scale(.98); }
      .toolbar-wrap { bottom: 12px; width: calc(100vw - 24px); justify-content: center; }
      .toolbar { flex: 1; justify-content: space-around; }
      .tool-button { min-width: 38px; height: 40px; padding: 0 8px; }
      .tool-button span { display: none; }
      .info-toggle { width: 44px; height: 44px; }
      .hint { bottom: 70px; font-size: 8px; }
      .hotspot span { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      body::after, .live-dot, .loader-ring::before, .loader-track::before { animation: none !important; }
      * { scroll-behavior: auto !important; }
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <noscript><div class="noscript">需要启用 JavaScript 才能查看 3D 机械腕表。</div></noscript>

  <div id="stage" aria-label="可旋转的 3D 镂空机械腕表"></div>

  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <div>
        <div class="brand-title">CALIBRE 01</div>
        <div class="brand-sub">Openworked Manufacture</div>
      </div>
    </div>
    <div class="scene-meta"><span class="live-dot"></span><span>机械运转中 · 28,800 vph</span></div>
  </header>

  <div class="chapter">01 · Anatomy of time</div>

  <aside class="panel" id="panel" aria-live="polite">
    <div class="panel-kicker">
      <span id="panel-kicker">Manufacture Calibre</span>
      <button class="panel-close" id="panel-close" aria-label="关闭信息面板">×</button>
    </div>
    <h1 id="panel-title">时间的机械建筑</h1>
    <p class="panel-lead" id="panel-lead">由 248 枚零件组成的手动上链镂空机芯。拖动观察，悬停识别零件，点击锁定并探索其功能。</p>
    <div class="metric-grid" id="metric-grid">
      <div class="metric"><div class="metric-value">72 h</div><div class="metric-label">动力储存</div></div>
      <div class="metric"><div class="metric-value">31</div><div class="metric-label">红宝石</div></div>
      <div class="metric"><div class="metric-value">4 Hz</div><div class="metric-label">摆频</div></div>
    </div>
    <div class="detail-list" id="detail-list">
      <div class="detail-row"><span>机芯直径</span><span>34.6 mm</span></div>
      <div class="detail-row"><span>结构</span><span>手动上链 · 镂空</span></div>
      <div class="detail-row"><span>表壳</span><span>钛金属 · 蓝宝石水晶</span></div>
      <div class="detail-row"><span>显示</span><span>时 · 分 · 小秒</span></div>
    </div>
    <button class="focus-button" id="focus-button">聚焦当前部件</button>
  </aside>

  <div id="tooltip">
    <div class="tooltip-box">
      <div class="tooltip-id" id="tooltip-id">Part 01</div>
      <div class="tooltip-name" id="tooltip-name">部件</div>
    </div>
  </div>

  <div id="hotspots" aria-hidden="true"></div>
  <div class="hint" id="hint">拖动旋转 · 滚轮缩放 · 悬停识别 · 点击锁定</div>

  <div class="toolbar-wrap">
    <div class="toolbar" role="toolbar" aria-label="3D 腕表控制">
      <button class="tool-button active" id="rotate-button" aria-pressed="true" title="自动旋转">
        <svg viewBox="0 0 24 24"><path d="M20 7v5h-5"/><path d="M19 12a7 7 0 1 1-2.05-4.95L20 10"/></svg><span>旋转</span>
      </button>
      <button class="tool-button" id="explode-button" aria-pressed="false" title="爆炸视图">
        <svg viewBox="0 0 24 24"><path d="m12 3 7 4-7 4-7-4 7-4Z"/><path d="m5 12 7 4 7-4"/><path d="m5 17 7 4 7-4"/></svg><span>爆炸</span>
      </button>
      <button class="tool-button" id="label-button" aria-pressed="false" title="部件标签">
        <svg viewBox="0 0 24 24"><path d="M20 13 13 20l-9-9V4h7l9 9Z"/><path d="M8.5 8.5h.01"/></svg><span>标签</span>
      </button>
      <button class="tool-button" id="lume-button" aria-pressed="false" title="夜光模式">
        <svg viewBox="0 0 24 24"><path d="M21 12.8A8.2 8.2 0 1 1 11.2 3 6.4 6.4 0 0 0 21 12.8Z"/></svg><span>夜光</span>
      </button>
      <div class="separator"></div>
      <button class="tool-button" id="reset-button" title="重置视角">
        <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg><span>复位</span>
      </button>
    </div>
    <button class="info-toggle" id="info-toggle" aria-label="显示机芯信息">i</button>
  </div>

  <div class="loading" id="loading">
    <div class="loader">
      <div class="loader-ring"></div>
      <div class="loader-title">CALIBRE 01</div>
      <div class="loader-copy">正在组装 248 枚精密零件</div>
      <div class="loader-track"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const stage = document.getElementById('stage');
    const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const isTouch = matchMedia('(pointer: coarse)').matches;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050706);
    scene.fog = new THREE.FogExp2(0x050706, 0.022);

    const camera = new THREE.PerspectiveCamera(32, innerWidth / innerHeight, 0.1, 80);
    camera.position.set(0.2, 1.1, isTouch ? 25 : 22);

    function roundedRectShape(width, height, radius) {
      const x = -width / 2, y = -height / 2;
      const s = new THREE.Shape();
      s.moveTo(x + radius, y);
      s.lineTo(x + width - radius, y);
      s.quadraticCurveTo(x + width, y, x + width, y + radius);
      s.lineTo(x + width, y + height - radius);
      s.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      s.lineTo(x + radius, y + height);
      s.quadraticCurveTo(x, y + height, x, y + height - radius);
      s.lineTo(x, y + radius);
      s.quadraticCurveTo(x, y, x + radius, y);
      return s;
    }

    function extrudedShape(shape, depth, material, bevel = 0.05) {
      const geo = new THREE.ExtrudeGeometry(shape, { depth, bevelEnabled: true, bevelSegments: 2, bevelSize: bevel, bevelThickness: bevel, curveSegments: 24 });
      geo.center();
      geo.computeVertexNormals();
      return new THREE.Mesh(geo, material);
    }

    function cylinder(radius, depth, material, segments = 64) {
      const mesh = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, depth, segments, 1, false), material);
      mesh.rotation.x = Math.PI / 2;
      return mesh;
    }

    function ring(radius, tube, material, radial = 96) {

    }

    function screw(radius = 0.15, depth = 0.12, blue = true) {

      const slotMat = new THREE.MeshBasicMaterial({ color: blue ? 0x081325 : 0x262b29 });
      const slot = new THREE.Mesh(new THREE.BoxGeometry(radius * 1.35, radius * .22, depth * .22), slotMat);
      slot.position.z = depth * .55;
      g.add(slot);
      return g;
    }

    function gearShape(radius, teeth, toothDepth, holeRadius) {
      const s = new THREE.Shape();
      const count = teeth * 4;
      for (let i = 0; i <= count; i++) {
        const a = (i / count) * Math.PI * 2;
        const phase = i % 4;
        const r = phase === 1 || phase === 2 ? radius + toothDepth : radius;
        const x = Math.cos(a) * r, y = Math.sin(a) * r;
        i === 0 ? s.moveTo(x, y) : s.lineTo(x, y);
      }
      const hole = new THREE.Path();
      hole.absarc(0, 0, holeRadius, 0, Math.PI * 2, true);
      s.holes.push(hole);
      return s;
    }

    function createGear({ radius, teeth, depth = .16, material = mat.brass, spokes = 5, hub = .2, toothDepth = .11 }) {
      const g = new THREE.Group();
      const wheel = extrudedShape(gearShape(radius, teeth, toothDepth, radius * .29), depth, material, .025);
      g.add(wheel);
      const spokeMaterial = material.clone();
      spokeMaterial.roughness = Math.min(1, (material.roughness || .2) + .08);
      for (let i = 0; i < spokes; i++) {
        const a = i / spokes * Math.PI * 2;
        const len = radius * .66;
        const spoke = new THREE.Mesh(new THREE.BoxGeometry(len, Math.max(.055, radius * .075), depth * .72), spokeMaterial);
        spoke.position.set(Math.cos(a) * radius * .33, Math.sin(a) * radius * .33, 0);
        spoke.rotation.z = a;
        g.add(spoke);
      }
      g.add(cylinder(hub, depth * 1.35, material, 32));
      const pinion = cylinder(hub * .48, depth * 2.8, mat.steel, 24);
      pinion.position.z = depth * .55;
      g.add(pinion);
      return g;
    }

    function spiralTube(inner, outer, turns, depth, material, thickness = .025, points = 220) {
      const p = [];
      for (let i = 0; i <= points; i++) {
        const t = i / points;
        const a = t * turns * Math.PI * 2;
        const r = inner + (outer - inner) * t;
        p.push(new THREE.Vector3(Math.cos(a) * r, Math.sin(a) * r, depth + Math.sin(t * Math.PI) * .015));
      }
      const curve = new THREE.CatmullRomCurve3(p);
      return new THREE.Mesh(new THREE.TubeGeometry(curve, points, thickness, 5, false), material);
    }

    function bridge(width, height, angle, x, y, z, material, holes = []) {

        cut.absarc(h.x, h.y, h.r, 0, Math.PI * 2, true);
        s.holes.push(cut);
      }
      const mesh = extrudedShape(s, .2, material, .055);
      mesh.position.set(x, y, z);
      mesh.rotation.z = angle;
      return mesh;
    }

      composer.render();
    }

    controls.addEventListener('start',()=>document.getElementById('hint').classList.add('hide'));
    window.addEventListener('resize',()=>{
      camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);
      bloom.resolution.set(innerWidth,innerHeight);
    });

    renderer.compile(scene,camera);
    animate();
    setTimeout(()=>document.getElementById('loading').classList.add('done'),720);
  </script>
</body>
</html>
