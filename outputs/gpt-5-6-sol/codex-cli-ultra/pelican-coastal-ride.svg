      <circle r="154" fill="none" stroke="#c9d8d6" stroke-width="5"/>
      <use href="#spokeSet"/>
      <circle r="19" fill="url(#metal)" stroke="#23393d" stroke-width="5"/>
      <circle r="7" fill="#d9eee9"/>
