    <path d="M83 722q38-55 80-25q-43-2-72 39Z" fill="#a5a08a"/>
    <path d="M1427 751q23-73 91-57q50 15 45 77h-138Z" fill="#686d66"/>
    <path d="M1443 733q25-45 73-33q-44 6-66 44Z" fill="#a4a08b"/>
  </g>

  <!-- cast shadow -->
  <ellipse cx="884" cy="896" rx="415" ry="66" fill="#263f3d" opacity=".24" filter="url(#soft)"/>
  <path d="M451 863 C625 827 1064 830 1324 874" fill="none" stroke="#5d4737" stroke-width="23" stroke-linecap="round" opacity=".19" filter="url(#soft)"/>

