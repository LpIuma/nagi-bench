      <path d="M78 675q8-58 17-91M81 671q-18-45-35-68M92 667q29-47 52-69M1490 672q-5-58-4-103M1490 669q-29-49-52-78M1501 669q26-50 55-83"/>
    </g>
    <g stroke="#93a95f" stroke-width="5">
      <path d="M121 688q5-45 18-79M119 686q-20-28-38-44M1431 684q4-55 17-90M1438 677q24-35 45-49M1544 675q-8-49-3-82"/>
    </g>
  </g>
