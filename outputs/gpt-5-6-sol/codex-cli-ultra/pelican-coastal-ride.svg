  <!-- warm atmospheric glaze and subtle grain -->
  <rect width="1600" height="1000" fill="#f7b56a" opacity=".045" pointer-events="none"/>
  <rect width="1600" height="1000" fill="transparent" filter="url(#grain)" opacity=".34" pointer-events="none"/>
</svg>
