<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <!-- 天空渐变（日落） -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1E2A52"/>
      <stop offset="20%" stop-color="#3F4F88"/>
      <stop offset="40%" stop-color="#D77660"/>
      <stop offset="55%" stop-color="#F2A66B"/>
      <stop offset="75%" stop-color="#FFD9A8"/>
      <stop offset="100%" stop-color="#FFEBC9"/>
    </linearGradient>

    <!-- 太阳光晕 -->
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#FFFCE0" stop-opacity="1"/>
      <stop offset="35%" stop-color="#FFD78A" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#FFA060" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF8040" stop-opacity="0"/>
    </radialGradient>

    <!-- 海面渐变 -->
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#6F9FB8"/>
      <stop offset="30%" stop-color="#3F6E8A"/>
      <stop offset="70%" stop-color="#1F3F58"/>
      <stop offset="100%" stop-color="#10283D"/>
    </linearGradient>

    <!-- 沙滩 -->
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#E8C988"/>
      <stop offset="40%" stop-color="#D9B673"/>
      <stop offset="100%" stop-color="#A8864E"/>
    </linearGradient>

    <!-- 远山 -->
    <linearGradient id="mountains" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5A6F8A" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#2F4055" stop-opacity="0.95"/>
    </linearGradient>

    <!-- 云 -->
    <radialGradient id="cloud" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#FFE9D0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD0A0" stop-opacity="0"/>
    </radialGradient>

    <!-- 鹈鹕羽毛 -->
    <linearGradient id="feather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#F2EDE2"/>
      <stop offset="100%" stop-color="#C7BFAE"/>
    </linearGradient>
    <linearGradient id="featherHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E1D2"/>
    </linearGradient>
    <linearGradient id="wing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#C9C2B0"/>
      <stop offset="100%" stop-color="#7C745E"/>
    </linearGradient>

    <!-- 鹈鹕喙（橙黄过渡） -->
    <linearGradient id="beak" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%"  stop-color="#FFD27A"/>
      <stop offset="40%" stop-color="#F4943D"/>
      <stop offset="100%" stop-color="#B8521B"/>
    </linearGradient>
    <linearGradient id="beakTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFDA85"/>
      <stop offset="100%" stop-color="#E07B30"/>
    </linearGradient>

    <!-- 喉囊（更软更透） -->
    <radialGradient id="pouch" cx="0.45" cy="0.4" r="0.7">
      <stop offset="0%"  stop-color="#FFD0A0"/>
      <stop offset="50%" stop-color="#F4943D"/>
      <stop offset="100%" stop-color="#9E4416"/>
    </radialGradient>

    <!-- 自行车车架（亮红） -->
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FF5757"/>
      <stop offset="50%" stop-color="#D12030"/>
      <stop offset="100%" stop-color="#7A0A18"/>
    </linearGradient>

    <!-- 轮胎 -->
    <radialGradient id="tire" cx="0.5" cy="0.5" r="0.5">
      <stop offset="60%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>

    <!-- 轮毂（金属） -->
    <radialGradient id="hub" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%"  stop-color="#F0F0F0"/>
      <stop offset="60%" stop-color="#A0A0A0"/>
      <stop offset="100%" stop-color="#505050"/>
    </radialGradient>

    <!-- 软阴影 -->
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="1.5" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- 较大阴影（自行车/鹈鹕） -->
    <filter id="big" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="3" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- 浪花模糊 -->
    <filter id="blur1"><feGaussianBlur stdDeviation="1"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- ========== 天空 ========== -->
  <rect x="0" y="0" width="1000" height="430" fill="url(#sky)"/>

  <!-- 太阳 -->
  <circle cx="780" cy="240" r="180" fill="url(#sun)"/>
  <circle cx="780" cy="240" r="55"  fill="#FFFBE6" opacity="0.95"/>

  <!-- 云朵 -->
  <g>
    <ellipse cx="180" cy="120" rx="80" ry="22" fill="url(#cloud)"/>
    <ellipse cx="220" cy="115" rx="55" ry="18" fill="url(#cloud)"/>
    <ellipse cx="130" cy="125" rx="40" ry="14" fill="url(#cloud)"/>

    <ellipse cx="430" cy="180" rx="90" ry="25" fill="url(#cloud)" opacity="0.9"/>
    <ellipse cx="490" cy="172" rx="60" ry="20" fill="url(#cloud)" opacity="0.9"/>

    <ellipse cx="900" cy="320" rx="70" ry="20" fill="url(#cloud)" opacity="0.7"/>
  </g>

  <!-- 飞鸟剪影 -->
  <g fill="none" stroke="#3A4860" stroke-width="2" stroke-linecap="round">
    <path d="M 60 220 q 8 -8 16 0 q 8 -8 16 0"/>
    <path d="M 130 260 q 6 -6 12 0 q 6 -6 12 0"/>
    <path d="M 360 130 q 7 -7 14 0 q 7 -7 14 0"/>
    <path d="M 540 100 q 9 -9 18 0 q 9 -9 18 0"/>
    <path d="M 620 220 q 6 -6 12 0 q 6 -6 12 0"/>
    <path d="M 880 160 q 7 -7 14 0 q 7 -7 14 0"/>
  </g>

  <!-- ========== 远山 ========== -->
  <path d="M 0 430 L 120 380 L 220 410 L 340 360 L 470 405 L 580 375 L 720 410 L 850 385 L 1000 415 L 1000 430 Z" fill="url(#mountains)"/>
  <path d="M 0 430 L 90 415 L 200 425 L 320 410 L 460 425 L 600 415 L 760 425 L 900 418 L 1000 425 L 1000 430 Z" fill="#3F506B" opacity="0.7"/>

  <!-- ========== 海面 ========== -->
  <rect x="0" y="430" width="1000" height="160" fill="url(#sea)"/>

  <!-- 海面反射光（太阳倒影） -->
  <ellipse cx="780" cy="445" rx="70" ry="3" fill="#FFD8A8" opacity="0.7"/>
  <ellipse cx="780" cy="460" rx="50" ry="2" fill="#FFD8A8" opacity="0.5"/>
  <ellipse cx="780" cy="475" rx="35" ry="2" fill="#FFD8A8" opacity="0.35"/>
  <ellipse cx="780" cy="495" rx="20" ry="1.5" fill="#FFD8A8" opacity="0.25"/>

  <!-- 海浪线 -->
  <g fill="none" stroke="#FFFFFF" stroke-linecap="round" opacity="0.6">
    <path d="M 0 445 q 25 -3 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0" stroke-width="1.2"/>
    <path d="M 0 470 q 30 -3 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0" stroke-width="1.5"/>
    <path d="M 0 500 q 35 -3 70 0 t 70 0 t 70 0 t 70 0 t 70 0 t 70 0 t 70 0 t 70 0 t 70 0 t 70 0 t 70 0 t 70 0" stroke-width="1.8"/>
    <path d="M 0 535 q 40 -3 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0" stroke-width="2"/>
  </g>

  <!-- 浪花泡沫 -->
  <g fill="#FFFFFF" opacity="0.85">
    <ellipse cx="40"  cy="568" rx="14" ry="3"/>
    <ellipse cx="80"  cy="572" rx="8"  ry="2"/>
    <ellipse cx="120" cy="570" rx="10" ry="2.5"/>
    <ellipse cx="200" cy="575" rx="12" ry="2.5"/>
    <ellipse cx="260" cy="572" rx="9"  ry="2"/>
    <ellipse cx="340" cy="578" rx="14" ry="3"/>
    <ellipse cx="820" cy="572" rx="12" ry="2.5"/>
    <ellipse cx="900" cy="575" rx="14" ry="3"/>
    <ellipse cx="960" cy="570" rx="8"  ry="2"/>
  </g>

  <!-- ========== 沙滩 ========== -->
  <rect x="0" y="590" width="1000" height="110" fill="url(#sand)"/>

  <!-- 沙滩纹理（小石子、贝壳） -->
  <g opacity="0.6">
    <ellipse cx="60"  cy="640" rx="4" ry="2.2" fill="#A8824A"/>
    <ellipse cx="120" cy="660" rx="3" ry="1.5" fill="#8B6F3F"/>
    <ellipse cx="180" cy="675" rx="2.5" ry="1.3" fill="#A8824A"/>
    <ellipse cx="260" cy="650" rx="3" ry="1.5" fill="#8B6F3F"/>
    <ellipse cx="350" cy="685" rx="4" ry="2" fill="#A8824A"/>
    <ellipse cx="820" cy="660" rx="3" ry="1.5" fill="#8B6F3F"/>
    <ellipse cx="900" cy="680" rx="4" ry="2" fill="#A8824A"/>
    <ellipse cx="960" cy="650" rx="2.5" ry="1.2" fill="#8B6F3F"/>

    <!-- 贝壳 -->
    <path d="M 220 625 q 4 -4 8 0 q -4 4 -8 0 z" fill="#F0D8B0" stroke="#A8824A" stroke-width="0.4"/>
    <path d="M 760 640 q 5 -5 10 0 q -5 5 -10 0 z" fill="#F0D8B0" stroke="#A8824A" stroke-width="0.4"/>
  </g>

  <!-- 沙滩湿痕（浪刚退） -->
  <path d="M 0 600 q 100 -4 200 0 t 200 0 t 200 0 t 200 0 t 200 0" stroke="#C9A56E" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- 海草（左边） -->
  <g stroke="#5A7E48" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M 30 600 q 4 -15 0 -30 q -4 -15 4 -30 q 4 -12 -2 -22"/>
    <path d="M 50 600 q 6 -18 2 -32 q -4 -14 6 -28"/>
    <path d="M 70 600 q 4 -12 0 -24 q -3 -10 3 -20"/>
  </g>

  <!-- ========== 主体：自行车 + 鹈鹕 ========== -->

  <!-- 地面投影 -->
  <ellipse cx="500" cy="635" rx="180" ry="12" fill="#000000" opacity="0.22" filter="url(#blur2)"/>

  <!-- 自行车轮胎痕迹（动态） -->
  <g stroke="#8B6F3F" stroke-width="2" fill="none" opacity="0.55" stroke-dasharray="6 4">
    <path d="M 250 640 q 80 -2 160 0"/>
    <path d="M 590 640 q 80 -2 160 0"/>
  </g>

  <!-- 自行车 -->
  <g filter="url(#big)">
    <!-- 后轮 -->
    <g>
      <circle cx="410" cy="620" r="62" fill="url(#tire)"/>
      <circle cx="410" cy="620" r="54" fill="#F5F5F5"/>
      <circle cx="410" cy="620" r="50" fill="none" stroke="#2A2A2A" stroke-width="1"/>
      <!-- 辐条 -->
      <g stroke="#9A9A9A" stroke-width="1.2">
        <line x1="410" y1="572" x2="410" y2="668"/>
        <line x1="362" y1="620" x2="458" y2="620"/>
        <line x1="376" y1="586" x2="444" y2="654"/>
        <line x1="376" y1="654" x2="444" y2="586"/>
        <line x1="388" y1="578" x2="432" y2="662"/>
        <line x1="388" y1="662" x2="432" y2="578"/>
      </g>
      <circle cx="410" cy="620" r="9" fill="url(#hub)"/>
      <circle cx="410" cy="620" r="3" fill="#222"/>
    </g>

    <!-- 前轮 -->
    <g>
      <circle cx="660" cy="620" r="62" fill="url(#tire)"/>
      <circle cx="660" cy="620" r="54" fill="#F5F5F5"/>
      <circle cx="660" cy="620" r="50" fill="none" stroke="#2A2A2A" stroke-width="1"/>
      <g stroke="#9A9A9A" stroke-width="1.2">
        <line x1="660" y1="572" x2="660" y2="668"/>
        <line x1="612" y1="620" x2="708" y2="620"/>
        <line x1="626" y1="586" x2="694" y2="654"/>
        <line x1="626" y1="654" x2="694" y2="586"/>
        <line x1="638" y1="578" x2="682" y2="662"/>
        <line x1="638" y1="662" x2="682" y2="578"/>
      </g>
      <circle cx="660" cy="620" r="9" fill="url(#hub)"/>
      <circle cx="660" cy="620" r="3" fill="#222"/>
    </g>

    <!-- 车架（钻石型） -->
    <g stroke="url(#frame)" stroke-width="8" stroke-linecap="round" fill="none">
      <!-- 上管 座->头 -->
      <line x1="460" y1="510" x2="610" y2="490"/>
      <!-- 下管 座->头 -->
      <line x1="460" y1="510" x2="620" y2="560"/>
      <!-- 后下叉 座->后轮 -->
      <line x1="460" y1="510" x2="410" y2="620"/>
      <!-- 链管 中轴->后轮 -->
      <line x1="535" y1="555" x2="410" y2="620"/>
      <!-- 前叉 头->前轮 -->
      <line x1="610" y1="490" x2="660" y2="620"/>
    </g>
    <!-- 车架高光 -->
    <g stroke="#FF8888" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5">
      <line x1="460" y1="508" x2="610" y2="488"/>
      <line x1="460" y1="508" x2="620" y2="558"/>
    </g>

    <!-- 中轴 + 曲柄 + 踏板 -->
    <circle cx="535" cy="555" r="14" fill="url(#frame)"/>
    <circle cx="535" cy="555" r="8"  fill="#3A0508"/>
    <line x1="535" y1="555" x2="560" y2="525" stroke="#222" stroke-width="5" stroke-linecap="round"/>
    <line x1="535" y1="555" x2="510" y2="585" stroke="#222" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="560" cy="525" rx="10" ry="3.5" fill="#222"/>
    <ellipse cx="510" cy="585" rx="10" ry="3.5" fill="#222"/>

    <!-- 链条 -->
    <path d="M 535 555 L 460 555 L 420 615" stroke="#444" stroke-width="2.5" fill="none" stroke-dasharray="2 2"/>

    <!-- 座椅 -->
    <path d="M 440 502 q 20 -8 40 -2 q -2 8 -20 9 q -16 1 -20 -7 z" fill="#1A1A1A"/>
    <line x1="460" y1="510" x2="460" y2="525" stroke="#222" stroke-width="5"/>

    <!-- 把手 + 立管 -->
    <line x1="610" y1="490" x2="610" y2="455" stroke="#444" stroke-width="5" stroke-linecap="round"/>
    <line x1="575" y1="455" x2="650" y2="455" stroke="#222" stroke-width="7" stroke-linecap="round"/>
    <circle cx="575" cy="455" r="6" fill="#222"/>
    <circle cx="650" cy="455" r="6" fill="#222"/>

    <!-- 车铃 -->
    <circle cx="650" cy="445" r="5" fill="#E0A020"/>
    <circle cx="650" cy="445" r="2" fill="#7A5A10"/>
  </g>

  <!-- 自行车扬起的沙粒 -->
  <g fill="#D9B673" opacity="0.85">
    <circle cx="345" cy="615" r="2"/>
    <circle cx="360" cy="610" r="1.5"/>
    <circle cx="330" cy="620" r="1.5"/>
    <circle cx="380" cy="612" r="1.2"/>
    <circle cx="700" cy="615" r="2"/>
    <circle cx="715" cy="612" r="1.5"/>
    <circle cx="725" cy="618" r="1.2"/>
    <circle cx="690" cy="620" r="1.5"/>
  </g>

  <!-- ========== 鹈鹕 ========== -->
  <g filter="url(#big)">

    <!-- 尾巴 -->
    <path d="M 405 475 q -28 6 -45 -2 q -5 -8 5 -13 q 16 -2 38 7 z" fill="#D8CFB8"/>
    <!-- 尾羽纹理 -->
    <g fill="none" stroke="#8B8470" stroke-width="0.8" opacity="0.6">
      <path d="M 372 472 q 12 -2 26 -2"/>
      <path d="M 374 480 q 12 -2 24 -1"/>
    </g>

    <!-- 身体（饱满，前倾） -->
    <ellipse cx="478" cy="478" rx="80" ry="58" fill="url(#feather)"/>

    <!-- 肚子阴影 -->
    <ellipse cx="478" cy="498" rx="62" ry="30" fill="#000" opacity="0.07"/>

    <!-- 翅膀（身后方折叠，羽毛层次） -->
    <path d="M 410 452 q -50 6 -70 38 q -10 28 14 42 q 34 -10 65 -32 q 10 -28 -9 -48 z"
          fill="url(#wing)"/>
    <!-- 翅膀羽毛纹理 -->
    <g fill="none" stroke="#5E5742" stroke-width="1" opacity="0.7">
      <path d="M 350 495 q 28 -5 56 -10"/>
      <path d="M 348 505 q 28 -3 56 -8"/>
      <path d="M 352 482 q 26 -5 54 -10"/>
      <path d="M 358 470 q 24 -5 52 -8"/>
      <path d="M 364 460 q 22 -5 48 -7"/>
    </g>
    <!-- 翅膀尖飞羽 -->
    <path d="M 354 528 q 8 -3 18 0 q 6 3 0 6 q -10 2 -18 -2 z" fill="#5E5742" opacity="0.7"/>
    <path d="M 370 530 q 8 -3 18 0 q 6 3 0 6 q -10 2 -18 -2 z" fill="#5E5742" opacity="0.7"/>

    <!-- 翅膀（前方扶车把，伸向把手） -->
    <path d="M 545 460
             q 30 -18 60 -28
             q 14 -3 12 9
             q -12 22 -42 35
             q -18 6 -30 2 z"
          fill="url(#wing)"/>
    <g fill="none" stroke="#5E5742" stroke-width="1" opacity="0.7">
      <path d="M 560 458 q 22 -12 40 -18"/>
      <path d="M 562 470 q 22 -10 38 -16"/>
      <path d="M 558 480 q 22 -8 36 -14"/>
    </g>
    <!-- 翅尖搭在把手上 -->
    <ellipse cx="615" cy="442" rx="10" ry="6" fill="#7C745E"/>

    <!-- 脖子（从身体前上方延伸，S 弯向前） -->
    <path d="M 530 450
             C 562 438, 580 408, 575 378
             C 570 348, 595 320, 632 312
             C 660 308, 680 318, 688 332
             L 688 372
             C 660 366, 632 366, 610 380
             C 588 398, 562 425, 540 442 Z"
          fill="url(#featherHead)"/>
    <!-- 脖子阴影（侧） -->
    <path d="M 545 442 q 30 -10 50 -42 q 8 -25 -10 -42 q -16 25 -28 50 q -10 18 -12 32 z"
          fill="#000" opacity="0.08"/>
    <!-- 脖子羽毛条纹 -->
    <g fill="none" stroke="#D8CFB8" stroke-width="0.8" opacity="0.5">
      <path d="M 552 430 q 18 -8 32 -22"/>
      <path d="M 558 412 q 18 -8 30 -22"/>
      <path d="M 568 392 q 16 -6 28 -18"/>
    </g>

    <!-- 头部 -->
    <ellipse cx="678" cy="338" rx="42" ry="34" fill="url(#featherHead)"/>
    <!-- 头顶羽冠 -->
    <path d="M 662 312 q -3 -9 2 -13 q 7 4 5 13 z" fill="#E8E1D2"/>
    <path d="M 682 310 q 0 -11 6 -13 q 6 7 2 15 z" fill="#E8E1D2"/>
    <path d="M 700 314 q 5 -9 10 -8 q 4 8 -3 14 z" fill="#E8E1D2"/>

    <!-- 眼睛 -->
    <ellipse cx="698" cy="328" rx="7" ry="7.5" fill="#FFFFFF"/>
    <circle cx="699" cy="329" r="4.5" fill="#1A1A1A"/>
    <circle cx="700" cy="327" r="1.6" fill="#FFFFFF"/>
    <!-- 眼周皮肤 -->
    <ellipse cx="698" cy="328" rx="11" ry="10" fill="none" stroke="#E8B870" stroke-width="1.3" opacity="0.5"/>
    <!-- 眉毛/羽纹 -->
    <path d="M 686 318 q 10 -4 18 -1" stroke="#C7BFAE" stroke-width="1.2" fill="none" opacity="0.7"/>

    <!-- 上喙（长而弯） -->
    <path d="M 690 342
             Q 745 345, 790 358
             Q 815 366, 825 378
             Q 825 386, 802 384
             Q 745 378, 700 368
             Q 685 363, 682 354 Z"
          fill="url(#beakTop)"/>
    <!-- 上喙高光 -->
    <path d="M 705 348 Q 750 350, 795 362" stroke="#FFE6B5" stroke-width="2.2" fill="none" opacity="0.7"/>
    <!-- 上喙分线 -->
    <path d="M 690 366 Q 745 372, 800 378" stroke="#7A3A18" stroke-width="1.5" fill="none" opacity="0.85"/>

    <!-- 下喙 -->
    <path d="M 692 367
             Q 725 385, 770 398
             Q 802 405, 815 396
             Q 815 386, 793 380
             Q 745 376, 705 372
             Q 694 370, 692 367 Z"
          fill="url(#beak)"/>

    <!-- 喉囊（皮囊，自然下垂感） -->
    <path d="M 712 376
             Q 720 418, 740 448
             Q 762 463, 785 452
             Q 800 436, 805 415
             Q 810 395, 795 384
             Q 768 382, 742 382
             Q 722 380, 712 376 Z"
          fill="url(#pouch)"/>
    <!-- 喉囊纹理 -->
    <g fill="none" stroke="#7A3818" stroke-width="0.9" opacity="0.6">
      <path d="M 722 396 Q 740 432, 758 448"/>
      <path d="M 735 395 Q 748 432, 765 446"/>
      <path d="M 748 394 Q 758 425, 770 442"/>
    </g>
    <!-- 喉囊高光 -->
    <ellipse cx="728" cy="390" rx="16" ry="6" fill="#FFE0B5" opacity="0.65"/>

    <!-- 喙尖（钩） -->
    <path d="M 822 378 Q 830 378, 828 386 Q 822 388, 818 383 Z" fill="#7A3A18"/>
    <!-- 鼻孔 -->
    <ellipse cx="758" cy="354" rx="1.8" ry="1.1" fill="#5A2008"/>

    <!-- 腿 -->
    <g>
      <!-- 左腿（向下踩踏板） -->
      <path d="M 460 528 L 462 590" stroke="#E8B870" stroke-width="9" stroke-linecap="round"/>
      <path d="M 460 528 L 462 590" stroke="#FFD9A0" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
      <g stroke="#B8884E" stroke-width="0.8" opacity="0.7">
        <line x1="456" y1="545" x2="466" y2="545"/>
        <line x1="456" y1="560" x2="466" y2="560"/>
        <line x1="456" y1="575" x2="466" y2="575"/>
      </g>
      <!-- 左脚（蹼状，踩在前下踏板位置） -->
      <path d="M 448 590 L 478 590 L 484 600 L 452 602 L 444 595 Z" fill="#E8B870"/>
      <path d="M 448 590 L 478 590 L 484 600 L 452 602 L 444 595 Z" fill="none" stroke="#A87840" stroke-width="0.8"/>

      <!-- 右腿（抬起踩踏板，朝上） -->
      <path d="M 522 528 L 530 510" stroke="#E8B870" stroke-width="9" stroke-linecap="round"/>
      <path d="M 522 528 L 530 510" stroke="#FFD9A0" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
      <g stroke="#B8884E" stroke-width="0.8" opacity="0.7">
        <line x1="520" y1="520" x2="530" y2="520"/>
      </g>
      <!-- 右脚（踩在上踏板） -->
      <ellipse cx="535" cy="510" rx="13" ry="4" fill="#E8B870" stroke="#A87840" stroke-width="0.8"/>
    </g>
  </g>

  <!-- ========== 速度感：运动线 ========== -->
  <g stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.55">
    <line x1="170" y1="455" x2="280" y2="455"/>
    <line x1="190" y1="475" x2="290" y2="475"/>
    <line x1="200" y1="495" x2="270" y2="495"/>
    <line x1="160" y1="430" x2="240" y2="430"/>
  </g>

  <!-- 前景海草（左下角） -->
  <g stroke="#5A7E48" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M 0 690 q 8 -25 4 -45 q -6 -20 6 -35"/>
    <path d="M 25 690 q 6 -20 0 -38 q -8 -18 4 -32"/>
  </g>

  <!-- 整体氛围柔光 -->
  <rect x="0" y="0" width="1000" height="700" fill="url(#sun)" opacity="0.08"/>
</svg>
